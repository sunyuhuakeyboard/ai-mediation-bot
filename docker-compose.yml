services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediation
      POSTGRES_PASSWORD: mediation
      POSTGRES_DB: mediation
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediation"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    env_file:
      - .env
    environment:
      PG_DSN: postgresql+asyncpg://mediation:mediation@postgres:5432/mediation
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-doubao-pro-32k}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
