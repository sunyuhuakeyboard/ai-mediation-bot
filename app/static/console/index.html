<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>电子送达控制台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">AI</span>
        <div>
          <h1>电子送达控制台</h1>
          <p id="runtimeLine">连接中</p>
        </div>
      </div>
      <div class="top-actions">
        <label class="api-base">
          <span>API</span>
          <input id="apiBase" autocomplete="off" />
        </label>
        <a class="icon-link" href="/docs" target="_blank" rel="noreferrer" title="接口文档">Docs</a>
        <a class="icon-link" href="/redoc" target="_blank" rel="noreferrer" title="Redoc">Redoc</a>
        <button id="refreshAll" class="primary-btn" type="button">刷新</button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" aria-label="控制台导航">
        <button class="nav-item active" type="button" data-tab="dialog">对话测试</button>
        <button class="nav-item" type="button" data-tab="cases">案件</button>
        <button class="nav-item" type="button" data-tab="calls">通话</button>
        <button class="nav-item hidden" type="button" data-tab="policy">策略话术</button>
        <button class="nav-item" type="button" data-tab="knowledge">知识库</button>
        <button class="nav-item" type="button" data-tab="dnc">DNC</button>
        <button class="nav-item" type="button" data-tab="okcti">OKCTI</button>
        <button class="nav-item" type="button" data-tab="metrics">指标</button>
      </nav>

      <main class="workspace">
        <section class="overview-band">
          <div class="stat-tile">
            <span>服务</span>
            <strong id="healthStatus">-</strong>
          </div>
          <div class="stat-tile">
            <span>知识版本</span>
            <strong id="knowledgeVersion">-</strong>
          </div>
          <div class="stat-tile">
            <span>模式</span>
            <strong id="runtimeMode">-</strong>
          </div>
          <div class="stat-tile">
            <span>当前通话</span>
            <strong id="activeCall">-</strong>
          </div>
        </section>

        <section class="panel active" data-panel="dialog">
          <div class="split-grid">
            <div class="surface">
              <div class="section-head">
                <h2>发起通话</h2>
                <button id="useDemoCase" type="button" class="ghost-btn">演示案件</button>
              </div>
              <form id="startForm" class="form-grid">
                <label>
                  <span>案件编号</span>
                  <input id="caseId" value="CASE20260610001" autocomplete="off" />
                </label>
                <label>
                  <span>指定 call_id</span>
                  <input id="customCallId" placeholder="留空自动生成" autocomplete="off" />
                </label>
                <label class="check-row">
                  <input id="forceStart" type="checkbox" checked />
                  <span>跳过外呼策略</span>
                </label>
                <label class="wide">
                  <span>内联案件 JSON</span>
                  <textarea id="inlineCase" rows="8" spellcheck="false"></textarea>
                </label>
                <button class="primary-btn wide" type="submit">开始通话</button>
              </form>
            </div>

            <div class="surface">
              <div class="section-head">
                <h2>单轮对话</h2>
                <div class="inline-actions">
                  <button id="loadState" type="button" class="ghost-btn">状态</button>
                  <button id="endCall" type="button" class="danger-btn">结束</button>
                </div>
              </div>
              <form id="turnForm" class="form-grid">
                <label>
                  <span>call_id</span>
                  <input id="callIdInput" autocomplete="off" />
                </label>
                <label>
                  <span>结束结果</span>
                  <input id="endResult" value="测试结束" autocomplete="off" />
                </label>
                <label class="wide">
                  <span>用户文本</span>
                  <textarea id="userText" rows="4" spellcheck="false">是我，什么事</textarea>
                </label>
                <button class="primary-btn wide" type="submit">发送</button>
              </form>
            </div>
          </div>

          <div class="dialog-grid">
            <section class="surface transcript">
              <div class="section-head">
                <h2>对话流</h2>
                <button id="clearTimeline" type="button" class="ghost-btn">清空</button>
              </div>
              <div id="timeline" class="timeline"></div>
            </section>
            <section class="surface">
              <div class="section-head">
                <h2>最近响应</h2>
                <span id="lastLatency" class="subtle-pill">-</span>
              </div>
              <pre id="lastResponse" class="json-box">{}</pre>
            </section>
          </div>
        </section>

        <section class="panel" data-panel="cases">
          <div class="split-grid">
            <div class="surface">
              <div class="section-head">
                <h2>查询案件</h2>
              </div>
              <form id="caseLookupForm" class="form-grid">
                <label>
                  <span>案件编号</span>
                  <input id="lookupCaseId" value="CASE20260610001" autocomplete="off" />
                </label>
                <button class="primary-btn" type="submit">查询</button>
              </form>
              <pre id="caseOutput" class="json-box">{}</pre>
            </div>
            <div class="surface">
              <div class="section-head">
                <h2>导入案件</h2>
              </div>
              <form id="caseImportForm" class="form-grid">
                <label class="wide">
                  <span>请求 JSON</span>
                  <textarea id="caseImportJson" rows="14" spellcheck="false"></textarea>
                </label>
                <button class="primary-btn wide" type="submit">导入</button>
              </form>
              <pre id="caseImportOutput" class="json-box compact">{}</pre>
            </div>
          </div>
        </section>

        <section class="panel" data-panel="calls">
          <div class="split-grid">
            <div class="surface">
              <div class="section-head">
                <h2>通话查询</h2>
                <button id="copyActiveCall" type="button" class="ghost-btn">使用当前</button>
              </div>
              <form id="callQueryForm" class="form-grid">
                <label>
                  <span>call_id</span>
                  <input id="queryCallId" autocomplete="off" />
                </label>
                <div class="button-row">
                  <button class="primary-btn" type="submit" data-kind="transcript">转写</button>
                  <button class="ghost-btn" type="submit" data-kind="quality">质检</button>
                  <button class="ghost-btn" type="submit" data-kind="state">状态</button>
                </div>
              </form>
            </div>
            <div class="surface">
              <div class="section-head">
                <h2>结果</h2>
              </div>
              <pre id="callQueryOutput" class="json-box tall">{}</pre>
            </div>
          </div>
        </section>

        <section class="panel" data-panel="knowledge">
          <div class="split-grid">
            <div class="surface">
              <div class="section-head">
                <h2>快照</h2>
                <button id="reloadKnowledge" type="button" class="primary-btn">热更新</button>
              </div>
              <form id="knowledgeViewForm" class="form-grid">
                <label>
                  <span>表</span>
                  <select id="knowledgeTable">
                    <option value="routes">routes</option>
                    <option value="nodes">nodes</option>
                    <option value="labels">labels</option>
                    <option value="templates">templates</option>
                    <option value="strategies">strategies</option>
                    <option value="components">components</option>
                    <option value="compliance">compliance</option>
                    <option value="qc">qc</option>
                  </select>
                </label>
                <button class="primary-btn" type="submit">查看</button>
              </form>
              <pre id="knowledgeOutput" class="json-box tall">{}</pre>
            </div>
            <div class="surface">
              <div class="section-head">
                <h2>维护</h2>
              </div>
              <form id="knowledgeUpdateForm" class="form-grid">
                <label>
                  <span>表</span>
                  <select id="updateTable">
                    <option value="templates">templates</option>
                    <option value="routes">routes</option>
                    <option value="strategies">strategies</option>
                    <option value="labels">labels</option>
                    <option value="nodes">nodes</option>
                  </select>
                </label>
                <label>
                  <span>主键</span>
                  <input id="updatePk" placeholder="如 TPL_NO_MONEY_001" autocomplete="off" />
                </label>
                <label class="wide">
                  <span>字段 JSON</span>
                  <textarea id="knowledgePayload" rows="12" spellcheck="false">{}</textarea>
                </label>
                <button class="primary-btn wide" type="submit">保存</button>
              </form>
              <pre id="knowledgeUpdateOutput" class="json-box compact">{}</pre>
            </div>
          </div>
        </section>

        <section class="panel" data-panel="policy">
          <div class="surface">
            <div class="section-head">
              <h2>策略话术配置</h2>
              <div class="inline-actions">
                <span id="policyConfigStatus" class="subtle-pill">未加载</span>
                <button id="refreshPolicyConfig" type="button" class="ghost-btn">刷新</button>
                <button id="newPolicyItem" type="button" class="primary-btn">新建</button>
              </div>
            </div>

            <div class="policy-toolbar">
              <label>
                <span>配置类型</span>
                <select id="policyKind">
                  <option value="templates">话术模板</option>
                  <option value="strategies">调解策略</option>
                </select>
              </label>
              <label>
                <span>搜索</span>
                <input id="policySearch" placeholder="ID / 名称 / 节点 / 意图" autocomplete="off" />
              </label>
              <label>
                <span>节点</span>
                <select id="policyNodeFilter">
                  <option value="">全部节点</option>
                </select>
              </label>
              <label>
                <span>策略</span>
                <select id="policyStrategyFilter">
                  <option value="">全部策略</option>
                </select>
              </label>
              <label>
                <span>状态</span>
                <select id="policyStatusFilter">
                  <option value="">全部状态</option>
                  <option value="enabled">启用</option>
                  <option value="disabled">停用</option>
                </select>
              </label>
            </div>

            <div class="policy-layout">
              <aside class="policy-list-wrap" aria-label="策略话术列表">
                <div class="list-summary">
                  <strong id="policyListCount">0</strong>
                  <span id="policyListHint">条配置</span>
                </div>
                <div id="policyList" class="policy-list"></div>
              </aside>

              <div class="policy-editor">
                <form id="templateEditor" class="policy-form">
                  <div class="section-head editor-head">
                    <h2>话术模板</h2>
                    <div class="inline-actions">
                      <span id="templateDirtyState" class="subtle-pill">未选择</span>
                      <button id="duplicateTemplate" type="button" class="ghost-btn">复制</button>
                      <button class="primary-btn" type="submit">保存并热更新</button>
                    </div>
                  </div>
                  <div class="form-grid dense">
                    <label>
                      <span>模板ID</span>
                      <input id="templateId" autocomplete="off" />
                    </label>
                    <label>
                      <span>状态</span>
                      <select id="templateEnabled">
                        <option value="true">启用</option>
                        <option value="false">停用</option>
                      </select>
                    </label>
                    <label>
                      <span>适用节点</span>
                      <input id="templateNodeId" list="policyNodeOptions" autocomplete="off" />
                    </label>
                    <label>
                      <span>策略ID</span>
                      <input id="templateStrategyId" list="policyStrategyOptions" autocomplete="off" />
                    </label>
                    <label>
                      <span>意图/抗性</span>
                      <input id="templateIntent" list="policyIntentOptions" autocomplete="off" />
                    </label>
                    <label>
                      <span>合规等级</span>
                      <select id="templateComplianceLevel">
                        <option value="高">高</option>
                        <option value="中">中</option>
                        <option value="低">低</option>
                      </select>
                    </label>
                    <label class="wide">
                      <span>话术文本</span>
                      <textarea id="templateText" rows="5" spellcheck="false"></textarea>
                    </label>
                    <label class="wide">
                      <span>同义变体</span>
                      <textarea id="templateVariants" rows="7" spellcheck="false" placeholder="每行一条"></textarea>
                    </label>
                    <label>
                      <span>变量</span>
                      <input id="templateVariables" placeholder="name, total_amount" autocomplete="off" />
                    </label>
                    <label>
                      <span>质检分</span>
                      <input id="templateQualityScore" type="number" min="0" max="100" step="1" />
                    </label>
                    <label class="check-row">
                      <input id="templateCanDirect" type="checkbox" />
                      <span>可模板直出</span>
                    </label>
                    <label class="check-row">
                      <input id="templateNeedRewrite" type="checkbox" />
                      <span>允许LLM改写</span>
                    </label>
                    <label class="wide">
                      <span>备注</span>
                      <input id="templateRemark" autocomplete="off" />
                    </label>
                  </div>
                </form>

                <form id="strategyEditor" class="policy-form hidden">
                  <div class="section-head editor-head">
                    <h2>调解策略</h2>
                    <div class="inline-actions">
                      <span id="strategyDirtyState" class="subtle-pill">未选择</span>
                      <button id="duplicateStrategy" type="button" class="ghost-btn">复制</button>
                      <button class="primary-btn" type="submit">保存并热更新</button>
                    </div>
                  </div>
                  <div class="form-grid dense">
                    <label>
                      <span>策略ID</span>
                      <input id="strategyId" autocomplete="off" />
                    </label>
                    <label>
                      <span>策略名称</span>
                      <input id="strategyName" autocomplete="off" />
                    </label>
                    <label>
                      <span>适用节点</span>
                      <input id="strategyNodes" placeholder="N018,N019" autocomplete="off" />
                    </label>
                    <label>
                      <span>适用意图/抗性</span>
                      <input id="strategyIntents" placeholder="NO_MONEY,REQUEST_INSTALLMENT" autocomplete="off" />
                    </label>
                    <label>
                      <span>是否需要LLM</span>
                      <select id="strategyNeedLlm">
                        <option value="否">否</option>
                        <option value="可">可</option>
                        <option value="是">是</option>
                      </select>
                    </label>
                    <label>
                      <span>风险等级</span>
                      <select id="strategyRiskLevel">
                        <option value="低">低</option>
                        <option value="中">中</option>
                        <option value="高">高</option>
                        <option value="严重">严重</option>
                      </select>
                    </label>
                    <label class="wide">
                      <span>策略目标</span>
                      <input id="strategyGoal" autocomplete="off" />
                    </label>
                    <label class="wide">
                      <span>策略指令</span>
                      <textarea id="strategyInstruction" rows="7" spellcheck="false"></textarea>
                    </label>
                    <label>
                      <span>允许动作</span>
                      <input id="strategyAllowedActions" autocomplete="off" />
                    </label>
                    <label>
                      <span>禁止动作</span>
                      <input id="strategyForbiddenActions" autocomplete="off" />
                    </label>
                    <label class="wide">
                      <span>失败回退话术ID</span>
                      <input id="strategyFallbackTemplateId" list="policyTemplateOptions" autocomplete="off" />
                    </label>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <datalist id="policyNodeOptions"></datalist>
          <datalist id="policyStrategyOptions"></datalist>
          <datalist id="policyIntentOptions"></datalist>
          <datalist id="policyTemplateOptions"></datalist>
        </section>

        <section class="panel" data-panel="dnc">
          <div class="split-grid">
            <div class="surface">
              <div class="section-head">
                <h2>谢绝名单</h2>
                <button id="refreshDnc" type="button" class="ghost-btn">刷新</button>
              </div>
              <form id="dncForm" class="form-grid">
                <label>
                  <span>手机号</span>
                  <input id="dncPhone" autocomplete="off" />
                </label>
                <div class="button-row">
                  <button class="primary-btn" type="submit" data-action="add">加入</button>
                  <button class="danger-btn" type="submit" data-action="remove">移除</button>
                </div>
              </form>
            </div>
            <div class="surface">
              <div class="section-head">
                <h2>列表</h2>
              </div>
              <pre id="dncOutput" class="json-box tall">[]</pre>
            </div>
          </div>
        </section>

        <section class="panel" data-panel="okcti">
          <div class="split-grid">
            <div class="surface">
              <div class="section-head">
                <h2>SSE接口测试</h2>
                <div class="inline-actions">
                  <button id="okctiStartSample" type="button" class="ghost-btn">START</button>
                  <button id="okctiQaSample" type="button" class="ghost-btn">QA</button>
                  <button id="okctiEndSample" type="button" class="ghost-btn">END</button>
                </div>
              </div>
              <form id="okctiForm" class="form-grid">
                <label class="wide">
                  <span>请求 JSON</span>
                  <textarea id="okctiJson" rows="18" spellcheck="false"></textarea>
                </label>
                <button class="primary-btn wide" type="submit">发送到 /ivr/okcti/welcome</button>
              </form>
            </div>
            <div class="surface">
              <div class="section-head">
                <h2>原始 SSE 响应</h2>
                <span class="subtle-pill">[E-N=D]</span>
              </div>
              <pre id="okctiOutput" class="json-box tall">event:ivr</pre>
            </div>
          </div>
        </section>

        <section class="panel" data-panel="metrics">
          <div class="surface">
            <div class="section-head">
              <h2>Prometheus</h2>
              <div class="inline-actions">
                <a class="icon-link" href="/metrics" target="_blank" rel="noreferrer">打开</a>
                <button id="loadMetrics" type="button" class="primary-btn">加载</button>
              </div>
            </div>
            <pre id="metricsOutput" class="json-box metrics-box"># metrics</pre>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
